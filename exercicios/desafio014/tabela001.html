<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        th, td {
            border: solid 1px black;
            padding: 15px;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Área</th>
                <th>Disciplina</th>
                <th>Notas</th>
                <th>Média</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4">Exatas</th>
                <td>Matematica</td>
            </tr>
            <tr>
                <td>Fisica</td>
            </tr>
            <tr>
                <td>Quimica</td>
            </tr>
            <tr>
                <td>Biologia</td>
            </tr>
            <tr>
                <th colspan="5">Média de Exatas</th>
            </tr>
            <tr>
                <th rowspan="2">Humanas</th>
                <td>Historia</td>
            </tr>
            <tr>
                <td>Geografia</td>
            </tr>
            <tr>
                <th colspan="5">Média de Humanas</th>
            </tr>
        </tbody>
    </table>
</body>
</html>
