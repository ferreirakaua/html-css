<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modelos de caixas</title>
    <style>
        h1#ex1{
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightgray;

            height: 300px;
            width: 300px;

            border: 15px solid gray;

            padding: 20px;

            margin: 20px auto 50px auto;

            outline: 5px dashed red;
        }
        a{

            border: 10px solid blue;

            padding: 10px;
        }
        .ex2{
            background-color:lightgray;
            
            height: 150px;
            width: 200px;

            border: 25px solid gray;
            
            padding: 10px 10px 10px 50px;

            margin: 30px 20px 30px 20px;
        }

        .ex2:hover{
            background-color: rgba(7, 255, 7, 0.938);
        }
    </style>
</head>
<body>
    <h1 id="ex1">Exemplo de caixa</h1>
    <p>Paragrafos também são exemplos de box-level. <a href="#">mas os links são exemplos de caixas inline-level</a>, Vamos ver como tudo isso funciona. </p>
    <h1 class="ex2">CLIQUE AQUI</h1>
</body>
</html>
